version: '3.8'

services:
  app:
    build: .
    container_name: rezerwuj-app
    expose:
      - "8000"
    volumes:
      - rezerwuj-data:/app/data
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=sqlite:///./data/rezerwuj.db
    restart: always
    networks:
      - rezerwuj-network

  nginx:
    image: nginx:alpine
    container_name: rezerwuj-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    depends_on:
      - app
    restart: always
    networks:
      - rezerwuj-network

  certbot:
    image: certbot/certbot
    container_name: rezerwuj-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  rezerwuj-data:
  certbot-www:
  certbot-conf:

networks:
  rezerwuj-network:
    driver: bridge
