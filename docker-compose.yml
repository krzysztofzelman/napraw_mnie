services:
  db:
    image: postgres:16-alpine
    container_name: servicehub-db
    environment:
      POSTGRES_DB: servicehub
      POSTGRES_USER: servicehub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-servicehub_secret_2024}
    volumes:
      - servicehub-pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicehub -d servicehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: servicehub-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://servicehub:${DB_PASSWORD:-servicehub_secret_2024}@db:5432/servicehub
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  servicehub-pgdata:
