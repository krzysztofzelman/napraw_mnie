name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -d /root/napraw_mnie ]; then
              if [ -d /root/servicehub ]; then
                cp /root/servicehub/.env.production /root/ 2>/dev/null || true
                rm -rf /root/servicehub
              fi
              git clone git@github.com:krzysztofzelman/napraw_mnie.git /root/napraw_mnie
              if [ -f /root/.env.production ]; then
                mv /root/.env.production /root/napraw_mnie/.env.production
              fi
            fi
            cd /root/napraw_mnie

            # Utwórz .env.production jeśli brak (pierwsze wdrożenie lub po migracji)
            if [ ! -f .env.production ]; then
              cat > .env.production << 'ENVEOF'
DATABASE_URL=sqlite:///./data/napraw_mnie.db
SECRET_KEY=change-this-to-a-long-random-secret-key-for-production
SITE_URL=https://rezerwuj.kzelman.pl
STRIPE_SECRET_KEY=
STRIPE_PUBLISHABLE_KEY=
STRIPE_WEBHOOK_SECRET=
SUBSCRIPTION_PRICE_ID=
SMS_API_KEY=
SMS_SENDER=NaprawMnie
SMS_MOCK=true
TRIAL_DAYS=14
MAX_BOOKING_DAYS_AHEAD=60
SUBSCRIPTION_PRICE_PLN=4900
ENVEOF
              NEW_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(32))" 2>/dev/null || openssl rand -base64 32)
              sed -i "s/SECRET_KEY=.*/SECRET_KEY=$NEW_KEY/" .env.production
              echo "⚠️  .env.production utworzony z domyślnymi wartościami — uzupełnij SECRET_KEY i klucze API!"
            fi

            git pull origin master
            docker compose build app
            docker compose up -d app
